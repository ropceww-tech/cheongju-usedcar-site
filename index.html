<style>
  :root{
    --ember:#fc5000; --ember-dim:#e04700;
    --plasma:#524ae9; --sulfur:#f5f28e;
    --limestone:#f7f6f2; --pumice:#e2e2df;
    --obsidian:#070607; --obsidian-60:rgba(7,6,7,.6); --obsidian-14:rgba(7,6,7,.14);
    --chalk:#ffffff;
    --r-card:40px; --r-btn:40px; --r-pill:999px; --r-input:100px; --r-sm:16px; --r-md:20px;
    --display:'Black Han Sans',var(--sans);
    --sans:'Pretendard',-apple-system,"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    --num:'DM Sans',var(--sans);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--pumice);color:var(--obsidian);
    font-family:var(--sans);font-weight:500;line-height:1.6;-webkit-text-size-adjust:100%}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  button,input,select{font-family:inherit;font-size:1rem;font-weight:500}
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px}
  :focus-visible{outline:3px solid var(--obsidian);outline-offset:2px}
  .tnum{font-family:var(--num);font-variant-numeric:tabular-nums}

  /* ---------- 헤더 ---------- */
  header.top{position:sticky;top:0;z-index:50;background:var(--pumice);padding:16px 24px 0}
  .top-in{display:flex;align-items:center;justify-content:space-between;gap:12px;
    max-width:1232px;margin:0 auto;background:var(--limestone);border-radius:var(--r-pill);padding:9px 9px 9px 20px}
  .brand{display:flex;align-items:center;gap:9px;cursor:pointer;background:none;border:none;text-align:left}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:var(--ember);flex-shrink:0}
  .brand b{font-family:var(--display);font-size:1.2rem;letter-spacing:.01em;color:var(--obsidian);font-weight:400}
  .top-call{background:var(--ember);color:var(--obsidian);padding:12px 22px;border-radius:var(--r-pill);
    font-weight:700;font-size:.92rem;white-space:nowrap;min-height:40px;display:inline-flex;align-items:center;gap:7px;border:none}

  /* ---------- 히어로 ---------- */
  .hero{background:var(--pumice);padding:52px 24px 0}
  .hero-in{max-width:1232px;margin:0 auto}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center}
  .hero .eyebrow{font-size:.82rem;letter-spacing:.02em;color:var(--obsidian-60);font-weight:700;display:block;margin-bottom:16px}
  .hero h1{font-family:var(--display);font-weight:400;font-size:clamp(2.6rem,5.4vw,4.6rem);line-height:.98;letter-spacing:.02em;color:var(--obsidian)}
  .hero h1 span{color:var(--ember)}
  .hero p{color:var(--obsidian-60);font-size:1.02rem;max-width:44ch;line-height:1.7;margin-top:20px}
  .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:30px}
  .hero-cred{display:flex;flex-wrap:wrap;gap:8px;margin-top:26px}
  .hero-cred span{background:var(--limestone);border-radius:var(--r-pill);padding:7px 15px;font-size:.8rem;font-weight:700;color:var(--obsidian)}
  .halftone{position:relative;border-radius:var(--r-card);overflow:hidden;aspect-ratio:1/1.02;
    background:linear-gradient(155deg,var(--plasma) 0%,var(--ember) 78%)}
  .halftone .photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.4;mix-blend-mode:luminosity}
  .halftone .dots{position:absolute;inset:0;
    background-image:radial-gradient(circle,rgba(255,255,255,.85) 1.7px,transparent 1.7px);
    background-size:11px 11px;
    -webkit-mask-image:radial-gradient(ellipse 90% 90% at 78% 18%,#000 0%,rgba(0,0,0,.5) 45%,transparent 78%);
    mask-image:radial-gradient(ellipse 90% 90% at 78% 18%,#000 0%,rgba(0,0,0,.5) 45%,transparent 78%)}
  .halftone .cap{position:absolute;left:22px;right:22px;bottom:22px;color:var(--chalk)}
  .halftone .cap b{font-family:var(--display);font-weight:400;font-size:2.2rem;display:block;line-height:1}
  .halftone .cap span{font-size:.82rem;font-weight:700;opacity:.85}
  @media(max-width:880px){
    .hero-grid{grid-template-columns:1fr;gap:26px}
    .halftone{order:-1;aspect-ratio:16/10}
  }

  /* ---------- Stat Feature Card ---------- */
  .stats{padding:56px 24px 0}
  .stats-in{max-width:1232px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .stat-card{background:var(--ember);color:var(--chalk);border-radius:var(--r-card);padding:36px 32px;display:block}
  .stat-card b{font-family:var(--num);font-weight:700;font-size:clamp(2.6rem,5vw,3.6rem);display:block;line-height:1}
  .stat-card span{font-size:.88rem;font-weight:700;opacity:.92;display:block;margin-top:10px}
  .stat-card.buy{transition:background .15s}
  .stat-card.buy:hover{background:var(--ember-dim)}
  .stat-card.buy b{font-family:var(--display);font-weight:400;font-size:1.7rem;letter-spacing:.01em}
  @media(max-width:760px){.stats-in{grid-template-columns:1fr}}

  /* ---------- Content Card (강점) ---------- */
  .strengths{padding:20px 24px 0}
  .str-in{max-width:1232px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .ccard{background:var(--limestone);border-radius:var(--r-card);padding:32px}
  .ccard .tag{display:inline-block;background:var(--sulfur);color:var(--obsidian);border-radius:var(--r-pill);
    padding:4px 12px;font-size:.76rem;font-weight:700;margin-bottom:16px}
  .ccard b{display:block;font-family:var(--display);font-weight:400;font-size:1.5rem;letter-spacing:.01em}
  .ccard span{display:block;color:var(--obsidian-60);font-size:.87rem;margin-top:8px;line-height:1.55}
  @media(max-width:760px){.str-in{grid-template-columns:1fr}}

  /* ---------- 소개 (Plasma 콜아웃 1회) ---------- */
  .intro{padding:20px 24px 0}
  .intro-in{max-width:1232px;margin:0 auto}
  .plasma-card{background:var(--plasma);color:var(--chalk);border-radius:var(--r-card);padding:38px;position:relative;overflow:hidden}
  .plasma-card::after{content:"";position:absolute;inset:0;
    background-image:radial-gradient(circle,rgba(255,255,255,.16) 1.6px,transparent 1.6px);background-size:12px 12px;
    -webkit-mask-image:linear-gradient(120deg,transparent 25%,#000 90%);mask-image:linear-gradient(120deg,transparent 25%,#000 90%)}
  .plasma-card h2{font-family:var(--display);font-weight:400;font-size:1.7rem;letter-spacing:.01em;margin-bottom:12px;position:relative}
  .plasma-card p{font-size:.94rem;line-height:1.75;max-width:64ch;opacity:.95;position:relative}
  .areas{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;position:relative}
  .areas span{background:rgba(255,255,255,.16);border-radius:var(--r-pill);padding:6px 14px;font-size:.78rem;font-weight:700}

  /* ---------- 찾아오시는 길 ---------- */
  .visit{padding:20px 24px 40px}
  .visit-in{max-width:1232px;margin:0 auto}
  .visit-card{background:var(--limestone);border-radius:var(--r-card);padding:32px}
  .va-line{font-family:var(--display);font-weight:400;font-size:1.35rem}
  .va-sub{color:var(--obsidian-60);font-size:.86rem;margin-top:6px}
  .map-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:20px}
  .mapbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 8px;border-radius:var(--r-pill);
    font-weight:700;font-size:.86rem;cursor:pointer;border:none;min-height:46px;text-align:center}
  .mapbtn.nv{background:#03c75a;color:#fff}
  .mapbtn.kk{background:#ffe812;color:#3a1d1d}
  .mapbtn.tm{background:#1b3ce0;color:#fff}
  .mapbtn.cp{background:var(--pumice);color:var(--obsidian)}
  @media(max-width:560px){.map-btns{grid-template-columns:1fr 1fr}}

  /* ---------- 상태 탭 (세그먼트 필) ---------- */
  .statetabs{display:inline-flex;gap:4px;margin:44px 0 20px;background:var(--limestone);border-radius:var(--r-pill);padding:5px}
  .statetabs button{border:none;background:transparent;padding:11px 20px;border-radius:var(--r-pill);font-weight:700;color:var(--obsidian-60);
    cursor:pointer;min-height:40px;font-size:.9rem}
  .statetabs button.on{background:var(--ember);color:var(--obsidian)}
  .statetabs button .n{opacity:.8;font-weight:700;margin-left:4px}

  /* ---------- 필터 ---------- */
  .filters-box{background:var(--limestone);border-radius:var(--r-card);padding:20px;margin-bottom:20px}
  .search{position:relative;margin-bottom:12px}
  .search input{width:100%;padding:15px 20px 15px 44px;border:none;border-radius:var(--r-input);background:var(--chalk);color:var(--obsidian)}
  .search input::placeholder{color:var(--obsidian-60)}
  .search input:focus{outline:2px solid var(--obsidian)}
  .search .ic{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--obsidian-60);width:16px;height:16px}
  .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
  .fgrid select{width:100%;padding:13px 18px;border:none;border-radius:var(--r-pill);
    background:var(--chalk);font-weight:700;color:var(--obsidian);min-height:44px}
  .fgrid select:focus{outline:2px solid var(--obsidian)}
  .origin-chips{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
  .ochip{background:var(--chalk);border:none;border-radius:var(--r-pill);padding:9px 18px;
    font-size:.85rem;font-weight:700;color:var(--obsidian);cursor:pointer;min-height:38px}
  .ochip.on{background:var(--obsidian);color:var(--chalk)}
  .adv-toggle{margin-top:12px;background:none;border:none;color:var(--obsidian);font-weight:700;
    font-size:.85rem;cursor:pointer;padding:6px 2px;min-height:38px;text-decoration:underline}
  .adv{display:none;margin-top:10px;padding-top:12px}
  .adv.open{display:block}
  .adv .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .adv .row label{font-weight:700;font-size:.82rem;min-width:64px;color:var(--obsidian-60)}
  .adv .row input{flex:1;min-width:90px;padding:10px 14px;border:none;border-radius:var(--r-input);background:var(--chalk);color:var(--obsidian)}
  .filter-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
  .reset-btn{background:transparent;border:none;border-radius:var(--r-pill);padding:8px 14px;font-weight:700;font-size:.82rem;cursor:pointer;color:var(--obsidian-60);text-decoration:underline}
  .count{color:var(--obsidian-60);font-size:.85rem;font-weight:700}

  /* ---------- 매물 그리드 ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px;padding-bottom:40px}
  .card{background:var(--limestone);border:none;border-radius:var(--r-card);
    overflow:hidden;cursor:pointer;transition:background .15s;
    text-align:left;width:100%;font:inherit;color:var(--obsidian);padding:0;display:block}
  .card:hover{background:#efeee8}
  .ph{position:relative;aspect-ratio:4/3;display:flex;align-items:flex-end;justify-content:flex-start;
    color:#fff;font-size:.8rem;font-weight:700;text-align:center;padding:14px;margin:10px;border-radius:calc(var(--r-card) - 10px);
    background-size:cover;background-position:center;background-color:var(--pumice);overflow:hidden}
  .badge-sold{position:absolute;top:14px;left:14px;z-index:2;background:var(--obsidian);color:var(--chalk);
    font-size:.72rem;font-weight:700;padding:6px 12px;border-radius:var(--r-pill)}
  .badge-cat{position:absolute;top:14px;right:14px;z-index:2;background:var(--sulfur);color:var(--obsidian);
    font-size:.7rem;font-weight:700;padding:5px 11px;border-radius:var(--r-pill)}
  .card-body{padding:6px 20px 22px}
  .car-name{font-family:var(--display);font-weight:400;font-size:1.15rem;letter-spacing:.005em;overflow-wrap:anywhere;word-break:break-word;color:var(--obsidian)}
  .car-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
  .car-tags .t{background:var(--sulfur);color:var(--obsidian);font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:var(--r-pill)}
  .car-meta{color:var(--obsidian-60);font-size:.82rem;margin-top:10px;overflow-wrap:anywhere;font-weight:700}
  .car-price{margin-top:10px;color:var(--ember-dim);font-weight:700;font-size:1.3rem;font-family:var(--num)}
  .car-price small{font-size:.76rem;color:var(--obsidian-60);font-weight:700;font-family:var(--sans)}
  .card.done{opacity:.55}

  /* ---------- 상세 ---------- */
  .detail{padding:32px 0 44px}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--obsidian-60);font-weight:700;
    font-size:.88rem;margin-bottom:18px;cursor:pointer;background:none;border:none;min-height:44px;padding:6px 4px}
  .back:hover{color:var(--obsidian)}
  .sheet{background:var(--limestone);border-radius:var(--r-card);padding:28px}
  .gallery{position:relative;border-radius:var(--r-md);overflow:hidden;background:var(--pumice);margin-bottom:26px}
  .slides{display:flex;transition:transform .3s ease;touch-action:pan-y}
  .slide{min-width:100%;aspect-ratio:16/10}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;
    background:rgba(7,6,7,.55);border:none;display:flex;align-items:center;
    justify-content:center;cursor:pointer;font-size:1.3rem;color:#fff;z-index:3}
  .gnav.prev{left:12px}.gnav.next{right:12px}
  .dots{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:3}
  .dots button{width:22px;height:22px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .dots button::before{content:"";width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.55)}
  .dots button.on::before{background:var(--ember);width:18px;border-radius:4px}
  .d-head{margin-bottom:10px}
  .d-title{font-family:var(--display);font-weight:400;font-size:2rem;letter-spacing:.01em;overflow-wrap:anywhere;word-break:break-word}
  .d-tags{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
  .d-tags .t{background:var(--sulfur);color:var(--obsidian);font-size:.78rem;font-weight:700;padding:5px 13px;border-radius:var(--r-pill)}
  .d-price{color:var(--ember-dim);font-weight:700;font-size:2rem;font-family:var(--num);margin-bottom:24px}
  .d-price small{font-size:.9rem;font-weight:700;color:var(--obsidian-60);font-family:var(--sans)}
  .spec{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px}
  .spec .item{background:var(--pumice);border-radius:var(--r-md);padding:16px 18px}
  .spec .item small{display:block;color:var(--obsidian-60);font-size:.76rem;margin-bottom:5px;font-weight:700}
  .spec .item b{font-size:1.05rem;font-family:var(--num);font-weight:700}
  .desc{background:var(--chalk);border-radius:var(--r-md);padding:20px;
    color:var(--obsidian);white-space:pre-line;margin-bottom:22px;overflow-wrap:anywhere;font-size:.94rem;line-height:1.75}

  /* ---------- 버튼 ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--ember);
    color:var(--obsidian);border:none;border-radius:var(--r-pill);padding:16px 26px;font-weight:700;cursor:pointer;
    width:100%;font-size:1rem;transition:background .15s;min-height:50px}
  .btn:hover{background:var(--ember-dim)}
  .btn.sec{background:transparent;color:var(--obsidian);border:1.5px solid var(--obsidian);border-radius:var(--r-btn)}
  .btn.sec:hover{background:rgba(7,6,7,.05)}
  .btn.onpaper{background:var(--chalk);color:var(--obsidian);border:1.5px solid var(--obsidian-14)}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap}

  .empty{text-align:center;color:var(--obsidian-60);padding:48px 16px;background:var(--limestone);

function inferBrand(name){
  const s=String(name||'');
  for(const [kw,origin,brand] of BRAND_KEYS){ if(s.indexOf(kw)>=0) return {origin,brand}; }
  return {origin:'국산',brand:'기타'};
}
function inferBody(name){
  const s=String(name||'');
  for(const [body,kws] of BODY_KEYS){ for(const kw of kws){ if(s.indexOf(kw)>=0) return body; } }
  return '기타';
}
const YEAR_MIN = 1980;

/* ---------- listings.json (1004motors 공유 데이터) ---------- */
let REMOTE = [];
async function loadRemote(){
  try{
    const res = await fetch(DATA_BASE+'listings.json?v='+Date.now(), {cache:'no-store'});
    if(res.ok){
      const data = await res.json();
      const arr = Array.isArray(data) ? data : (Array.isArray(data.listings) ? data.listings : null);
      if(Array.isArray(arr)) REMOTE = normalizeList(arr);
    }
  }catch(e){ /* 네트워크 실패 시 빈 목록 */ }
}
function getList(){ return REMOTE; }

/* ---------- 유틸 ---------- */
const won=n=>Number.isFinite(+n)?Number(n).toLocaleString('ko-KR'):'0';
const kmf=n=>Number.isFinite(+n)?Number(n).toLocaleString('ko-KR'):'0';
function priceLabel(p){return (Number.isFinite(+p)&&+p>0)?`${won(p)}<small> 만원</small>`:'<small>가격문의</small>';}
function priceLabelPlain(p){return (Number.isFinite(+p)&&+p>0)?`${won(p)} 만원`:'가격문의';}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function telHref(t){return 'tel:'+String(t).replace(/[^\d+]/g,'');}
function dealerName(d){return d?String(d).replace(/0\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4}/g,'').replace(/\s+/g,' ').trim():'';}
/* 매물 사진 경로는 1004motors 저장소 기준 상대경로(img/band/...)라 여기서는 그 도메인으로 절대경로화 */
function photoUrl(p){
  if(!p) return '';
  return /^https?:\/\//.test(p) ? p : DATA_BASE+p;
}
let toastT;
function toast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
function phGrad(hue,seedN){const h=((+hue||210)+seedN*18)%360;return `background:linear-gradient(135deg,hsl(${h},70%,55%),hsl(${(h+30)%360},75%,42%))`;}
function phStyle(c,seedN){if(c.photos&&c.photos.length){return `background-image:url('${photoUrl(c.photos[0]).replace(/'/g,"%27")}')`;}return phGrad(c.hue,seedN);}
function normalizeList(arr){
  return (arr||[]).map(c=>{
    const name=String(c.name||'이름없음');
    let origin=c.origin, brand=c.brand, bd=c.body;
    if(!origin||!brand){const inf=inferBrand(name);origin=origin||inf.origin;brand=brand||inf.brand;}
    if(!bd)bd=inferBody(name);
    return {
      id:c.id||name, name,
      origin:origin||'국산', brand:brand||'기타', body:bd||'기타',
      year:Number.isFinite(+c.year)?+c.year:YEAR_MIN,
      km:Number.isFinite(+c.km)?Math.max(0,+c.km):0,
      color:String(c.color||''), price:Number.isFinite(+c.price)?+c.price:0,
      fuel:String(c.fuel||''), trans:String(c.trans||''), dealer:String(c.dealer||''),
      sold:!!c.sold, hue:Number.isFinite(+c.hue)?+c.hue:210,
      photos:Array.isArray(c.photos)?c.photos:[],
      createdAt:Number.isFinite(+c.createdAt)?+c.createdAt:0,
      desc:String(c.desc||''),
      options:String(c.options||'')
    };
  });
}

let state={tab:'onsale',q:'',origin:'',brand:'',body:'',fuel:'',yearMin:'',yearMax:'',kmMax:'',sort:'new',adv:false};
function brandOptions(){
  if(state.origin==='국산') return BRANDS['국산'];
  if(state.origin==='수입') return BRANDS['수입'];
  return [...BRANDS['국산'],...BRANDS['수입'].filter(b=>b!=='기타')];
}
function filterSort(forSold){
  const q=state.q.trim().toLowerCase();
  let items=getList().filter(c=>{
    if(forSold ? !c.sold : c.sold) return false;
    if(state.origin && c.origin!==state.origin) return false;
    if(state.brand && c.brand!==state.brand) return false;
    if(state.body && c.body!==state.body) return false;
    if(state.fuel && !(c.fuel||'').includes(state.fuel)) return false;
    if(state.yearMin && (c.year||0)<+state.yearMin) return false;
    if(state.yearMax && (c.year||0)>+state.yearMax) return false;
    if(state.kmMax && (c.km||0)>+state.kmMax*10000) return false;
    if(!q) return true;
    const s=(c.name+' '+c.brand+' '+c.body+' '+c.color+' '+c.fuel+' '+c.year+' '+c.price+' '+c.km+' '+(c.trans||'')+' '+(c.desc||'')+' '+(c.options||'')).toLowerCase();
    return s.includes(q);
  });
  items.sort((a,b)=>{
    switch(state.sort){
      case 'price_a':return (a.price||0)-(b.price||0);
      case 'price_d':return (b.price||0)-(a.price||0);
      case 'year_d':return (b.year||0)-(a.year||0);
      case 'km_a':return (a.km||0)-(b.km||0);
      default:return (b.createdAt||0)-(a.createdAt||0);
    }
  });
  return items;
}

      </div>
      <div class="origin-chips" id="originChips">
        ${['','국산','수입'].map(o=>`<button type="button" class="ochip${state.origin===o?' on':''}" data-origin="${esc(o)}">${o?esc(o)+'차':'전체'}</button>`).join('')}
      </div>
      <div class="fgrid">
        <select id="brandSel" aria-label="제조사">
          <option value="">전체 제조사</option>
          ${bopts.map(b=>`<option value="${esc(b)}"${state.brand===b?' selected':''}>${esc(b)}</option>`).join('')}
        </select>
        <select id="bodySel" aria-label="차종">
          <option value="">전체 차종</option>
          ${BODY_TYPES.map(b=>`<option value="${esc(b)}"${state.body===b?' selected':''}>${esc(b)}</option>`).join('')}
        </select>
        <select id="fuelSel" aria-label="연료">
          <option value="">전체 연료</option>
          ${['가솔린','디젤','LPG','하이브리드','전기'].map(f=>`<option value="${esc(f)}"${state.fuel===f?' selected':''}>${esc(f)}</option>`).join('')}
        </select>
        <select id="sortSel" aria-label="정렬">
          <option value="new"${state.sort==='new'?' selected':''}>최신 등록순</option>
          <option value="price_a"${state.sort==='price_a'?' selected':''}>가격 낮은순</option>
          <option value="price_d"${state.sort==='price_d'?' selected':''}>가격 높은순</option>
          <option value="year_d"${state.sort==='year_d'?' selected':''}>연식 최신순</option>
          <option value="km_a"${state.sort==='km_a'?' selected':''}>주행거리 적은순</option>
        </select>
      </div>
      <button type="button" class="adv-toggle" id="advToggle">${state.adv?'▲ 상세필터 접기':'▼ 상세필터 (연식·주행거리)'}</button>
      <div class="adv${state.adv?' open':''}" id="advBox">
        <div class="row"><label>연식</label>
          <input id="yMin" type="number" inputmode="numeric" placeholder="예: 2018" value="${esc(state.yearMin)}"> ~
          <input id="yMax" type="number" inputmode="numeric" placeholder="예: 2024" value="${esc(state.yearMax)}"></div>
        <div class="row"><label>주행거리</label>
          <input id="kMax" type="number" inputmode="numeric" placeholder="이하 (만km) 예: 8" value="${esc(state.kmMax)}"> 만km 이하</div>
      </div>
      <div class="filter-actions">
        <span class="count" id="count"></span>
        <button type="button" class="reset-btn" id="resetBtn">필터 초기화</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <section class="visit"><div class="visit-in">
    <div class="visit-card">
      <div class="va-line">📍 찾아오시는 길</div>
      <div class="va-sub">청주시 청원구 2순환로 50 · 청주오토월드 중고차 매매단지 내</div>
      <div class="va-sub">상리사거리에서 성모병원 방향 · 24시간 상담 (연중무휴)</div>
      <div class="map-btns">
        <a class="mapbtn nv" href="https://map.naver.com/p/search/2%EC%88%9C%ED%99%98%EB%A1%9C%2050/address/3zDVce,2AafmC,%EC%B6%A9%EC%B2%AD%EB%B6%81%EB%8F%84%20%EC%B2%AD%EC%A3%BC%EC%8B%9C%20%EC%B2%AD%EC%9B%90%EA%B5%AC%202%EC%88%9C%ED%99%98%EB%A1%9C%2050?c=15.00,0,0,0,dh" target="_blank" rel="noopener">네이버 지도</a>
        <a class="mapbtn kk" href="https://map.kakao.com/?q=충청북도%20청주시%20청원구%202순환로%2050" target="_blank" rel="noopener">카카오맵</a>
        <a class="mapbtn tm" href="tmap://search?name=충청북도%20청주시%20청원구%202순환로%2050">티맵</a>
        <button class="mapbtn cp" type="button" onclick="copyAddr()">주소 복사</button>
      </div>
    </div>
  </div></section>`;

  document.getElementById('heroCall').setAttribute('href',telHref(SHOP.tel));
  document.getElementById('statBuy').setAttribute('href',telHref(SHOP.tel));
  const qEl=document.getElementById('q');
  qEl.addEventListener('input',e=>{state.q=e.target.value;renderGrid();});
  document.getElementById('originChips').addEventListener('click',e=>{
    const b=e.target.closest('.ochip'); if(!b)return;
    state.origin=b.dataset.origin; state.brand='';
    renderHome();
  });
  document.getElementById('brandSel').addEventListener('change',e=>{state.brand=e.target.value;renderGrid();});
  document.getElementById('bodySel').addEventListener('change',e=>{state.body=e.target.value;renderGrid();});
  document.getElementById('fuelSel').addEventListener('change',e=>{state.fuel=e.target.value;renderGrid();});
  document.getElementById('sortSel').addEventListener('change',e=>{state.sort=e.target.value;renderGrid();});
  document.getElementById('advToggle').addEventListener('click',()=>{state.adv=!state.adv;
    document.getElementById('advBox').classList.toggle('open',state.adv);
    document.getElementById('advToggle').textContent=state.adv?'▲ 상세필터 접기':'▼ 상세필터 (연식·주행거리)';});
  const bindNum=(id,key)=>{const el=document.getElementById(id);if(el)el.addEventListener('input',e=>{state[key]=e.target.value;renderGrid();});};
  bindNum('yMin','yearMin');bindNum('yMax','yearMax');bindNum('kMax','kmMax');
  document.getElementById('resetBtn').addEventListener('click',()=>{
    state={tab:state.tab,q:'',origin:'',brand:'',body:'',fuel:'',yearMin:'',yearMax:'',kmMax:'',sort:'new',adv:false};renderHome();});
  renderGrid();
}
function setTab(t){state.tab=t;renderHome();}
function renderGrid(){
  const items=filterSort(state.tab==='sold');
  const grid=document.getElementById('grid');
  const count=document.getElementById('count');
  if(!grid)return;
  count.textContent=`총 ${items.length}대`;
  grid.innerHTML = items.length ? items.map((c,i)=>`
    <button class="card${c.sold?' done':''}" type="button" onclick="location.hash='#detail/${encodeURIComponent(c.id)}'" aria-label="${esc(c.name)} 상세보기">
      <div class="ph${c.photos&&c.photos.length?' has-photo':''}" style="${phStyle(c,i)}">
        ${c.sold?'<span class="badge-sold">판매완료</span>':''}
        ${c.body&&c.body!=='기타'?`<span class="badge-cat">${esc(c.body)}</span>`:''}
      </div>
      <div class="card-body">
        <div class="car-name">${esc(c.name)}</div>
        <div class="car-tags">
          ${c.brand&&c.brand!=='기타'?`<span class="t">${esc(c.brand)}</span>`:''}
          ${c.origin?`<span class="t">${esc(c.origin)}</span>`:''}
          ${!c.sold?'<span class="t">성능점검완료</span>':''}
        </div>
        <div class="car-meta">${esc(c.year)}년식 · ${kmf(c.km)}km${c.fuel?' · '+esc(c.fuel):''}${c.color?' · '+esc(c.color):''}</div>
        <div class="car-price tnum">${priceLabel(c.price)}</div>
      </div>
    </button>`).join('')
    : `<div class="empty" style="grid-column:1/-1">${state.tab==='sold'?'판매완료된 매물이 없습니다.':'조건에 맞는 매물이 없습니다.'}</div>`;
}

/* ---------- 상세 ---------- */
let gIndex=0,gCount=0;
function renderDetail(id){
  const c=getList().find(x=>x.id===id);
  if(!c){toast('해당 매물을 찾을 수 없습니다.');goHome();return;}
  gIndex=0;
  const photos=(c.photos&&c.photos.length)?c.photos:[null,null,null];
  gCount=photos.length;
  let slides='';
  photos.forEach((p,i)=>{const st=p?`background-image:url('${photoUrl(p).replace(/'/g,"%27")}')`:phGrad(c.hue,i);
    slides+=`<div class="slide ph${p?' has-photo':''}" style="${st}">${p?'':`<span>사진 준비중 ${i+1}</span>`}</div>`;});
  let dots='';for(let i=0;i<gCount;i++)dots+=`<button type="button" class="${i===0?'on':''}" data-d="${i}" aria-label="${i+1}번째 사진"></button>`;
  document.title=`${c.name} — 청주중고차`;
  document.getElementById('view').innerHTML=`
  <div class="wrap detail">
    <button class="back" type="button" onclick="goBackOrHome()">← 목록으로</button>
    <div class="sheet">
      <div class="gallery" id="gallery" tabindex="0" role="region" aria-label="차량 사진 갤러리">
        <div class="slides" id="slides">${slides}</div>
        ${gCount>1?`<button type="button" class="gnav prev" aria-label="이전 사진" onclick="slide(-1)">‹</button>
        <button type="button" class="gnav next" aria-label="다음 사진" onclick="slide(1)">›</button>
        <div class="dots" id="dots">${dots}</div>`:''}
      </div>
      <div class="d-head">
        <div class="d-title">${esc(c.name)} ${c.sold?'<span class="badge-sold" style="position:static;display:inline-block">판매완료</span>':''}</div>
      </div>
      <div class="d-tags">
        ${c.origin?`<span class="t">${esc(c.origin)}차</span>`:''}
        ${c.brand&&c.brand!=='기타'?`<span class="t">${esc(c.brand)}</span>`:''}
        ${c.body&&c.body!=='기타'?`<span class="t">${esc(c.body)}</span>`:''}
        ${!c.sold?'<span class="t">성능점검완료</span>':''}
      </div>
      <div class="d-price tnum">${priceLabelPlain(c.price)}</div>
      <div class="spec">
        <div class="item"><small>연식</small><b>${esc(c.year)}년식</b></div>
        <div class="item"><small>주행거리</small><b>${kmf(c.km)} km</b></div>
        <div class="item"><small>연료</small><b>${esc(c.fuel||'문의')}</b></div>
        <div class="item"><small>변속기</small><b>${esc(c.trans||'-')}</b></div>
        ${c.color?`<div class="item"><small>색상</small><b>${esc(c.color)}</b></div>`:''}
        <div class="item"><small>차종</small><b>${esc(c.body||'-')}</b></div>
      </div>
      ${c.options?`<div class="desc" style="margin-bottom:10px"><b>옵션</b><br>${esc(c.options)}</div>`:''}
      <div class="desc">${esc(c.desc||'설명이 없습니다.')}</div>
      <div class="btn-row">
        <a class="btn" style="flex:1;text-decoration:none" href="${telHref(SHOP.tel)}">${c.sold?'비슷한 매물 전화 문의':'전화로 문의하기'}</a>
        <button class="btn onpaper" style="flex:1" onclick="shareCar('${encodeURIComponent(c.id)}')">링크 복사·공유</button>
      </div>
    </div>
  </div>`;
  setupGallery();
}
function slide(dir){if(gCount<=1)return;gIndex=(gIndex+dir+gCount)%gCount;const el=document.getElementById('slides');if(el)el.style.transform=`translateX(-${gIndex*100}%)`;document.querySelectorAll('#dots button').forEach(b=>b.classList.toggle('on',+b.dataset.d===gIndex));}
function goSlide(i){gIndex=i;const el=document.getElementById('slides');if(el)el.style.transform=`translateX(-${gIndex*100}%)`;document.querySelectorAll('#dots button').forEach(b=>b.classList.toggle('on',+b.dataset.d===gIndex));}
function setupGallery(){
  const el=document.getElementById('slides');if(!el)return;let x0=null;
  el.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>40)slide(dx<0?1:-1);x0=null;});
  document.querySelectorAll('#dots button').forEach(b=>b.addEventListener('click',()=>goSlide(+b.dataset.d)));
  const g=document.getElementById('gallery');
  if(g)g.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){slide(-1);e.preventDefault();}else if(e.key==='ArrowRight'){slide(1);e.preventDefault();}});
}
async function shareCar(encId){
  const url=location.origin+location.pathname+'#detail/'+encId;
  try{
    if(navigator.share){await navigator.share({title:SHOP.name,url});return;}
    if(navigator.clipboard){await navigator.clipboard.writeText(url);toast('링크를 복사했습니다.');return;}
  }catch(e){}
  toast('복사를 지원하지 않는 환경입니다.');
}

/* ---------- 시작 ---------- */
applyShop();
window.addEventListener('hashchange',router);
router();
loadRemote().then(()=>{ router(); });

/* ---------- 부드러운 스크롤 (Lenis) ----------
   "화면을 바로 점프시키지 않고 관성으로 부드럽게 미끄러지는" 스크롤. 어지러움을 느낄 수 있는
   사용자를 위한 prefers-reduced-motion 설정은 그대로 존중해 그 경우 켜지 않는다. */
if(window.Lenis && !window.matchMedia('(prefers-reduced-motion: reduce)').matches){
  const lenis = new Lenis({ duration: 1.05, smoothWheel: true });
  function raf(time){ lenis.raf(time); requestAnimationFrame(raf); }
  requestAnimationFrame(raf);
}
</script>
</body>
