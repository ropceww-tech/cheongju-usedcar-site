<style>
  :root{
    --cover:#10171f; --cover2:#0a0f15; --cover-line:rgba(233,228,214,.14);
    --paper:#f6f1e5; --paper-dim:#ece2c9; --paper-line:rgba(28,36,48,.14);
    --ink:#1c2430; --ink-soft:#5c6577;
    --off:#ece7d8; --off-soft:#9b9686;
    --seal:#9c2b2b; --seal-hi:#b23636; --seal-deep:#711f1f;
    --shadow:0 18px 40px rgba(0,0,0,.45); --shadow-sm:0 6px 16px rgba(0,0,0,.3);
    --r:5px; --r-lg:8px;
    --serif:'Noto Serif KR',"Nanum Myeongjo",serif;
    --sans:'Pretendard',-apple-system,"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cover);color:var(--off);
    font-family:var(--sans);line-height:1.6;-webkit-text-size-adjust:100%}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  button,input,select{font-family:inherit;font-size:1rem}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  :focus-visible{outline:2px solid var(--seal-hi);outline-offset:2px}
  .tnum{font-variant-numeric:tabular-nums}

  /* ---------- 헤더 ---------- */
  header.top{position:sticky;top:0;z-index:50;background:rgba(16,23,31,.92);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--cover-line)}
  .top-in{display:flex;align-items:center;justify-content:space-between;gap:12px;
    max-width:1080px;margin:0 auto;padding:13px 20px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer;background:none;border:none;text-align:left}
  .brand .seal-mark{width:36px;height:36px;flex-shrink:0}
  .brand b{font-family:var(--serif);font-size:1.12rem;letter-spacing:-.01em;color:var(--off);font-weight:700}
  .brand small{display:block;color:var(--off-soft);font-size:.68rem;font-weight:600;letter-spacing:.06em;margin-top:1px}
  .top-call{background:var(--seal);color:var(--off);padding:9px 17px;border-radius:var(--r);
    font-weight:700;font-size:.87rem;white-space:nowrap;min-height:38px;display:inline-flex;align-items:center;gap:6px;
    border:1px solid var(--seal-hi);transition:background .15s}
  .top-call:hover{background:var(--seal-hi)}

  /* ---------- 히어로 ---------- */
  .hero{background:
    radial-gradient(ellipse 720px 420px at 88% -10%,rgba(156,43,43,.16),transparent 60%),
    var(--cover);border-bottom:1px solid var(--cover-line)}
  .hero-in{padding:52px 20px 40px;max-width:1080px;margin:0 auto}
  .hero-grid{display:grid;grid-template-columns:1.25fr .9fr;gap:40px;align-items:center}
  .hero .eyebrow{font-family:var(--sans);font-size:.74rem;letter-spacing:.2em;color:var(--seal-hi);
    text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:18px}
  .hero .eyebrow::before{content:"";width:22px;height:1px;background:var(--seal-hi)}
  .hero h1{font-family:var(--serif);font-size:2.5rem;line-height:1.32;letter-spacing:-.01em;font-weight:900;color:var(--off)}
  .hero h1 em{font-style:normal;color:var(--seal-hi)}
  .hero-rule{width:64px;height:2px;background:var(--seal);margin:22px 0}
  .hero p{color:var(--off-soft);font-size:1rem;max-width:46ch;line-height:1.75}
  .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}
  .hero-cred{display:flex;flex-wrap:wrap;gap:8px 0;margin-top:22px;font-size:.8rem;color:var(--off-soft);font-weight:500}
  .hero-cred span:nth-child(even){margin:0 9px;color:var(--cover-line)}
  .hero-seal{display:flex;align-items:center;justify-content:center}
  .hero-seal svg{width:min(100%,260px);height:auto;color:var(--seal-hi);filter:drop-shadow(0 8px 20px rgba(156,43,43,.25))}
  @media(max-width:860px){
    .hero-grid{grid-template-columns:1fr;gap:28px}
    .hero-seal{order:-1}
    .hero-seal svg{width:150px}
    .hero h1{font-size:1.9rem}
  }

  /* ---------- 강점 (paper 카드) ---------- */
  .strengths{background:var(--cover);padding:6px 0 8px}
  .str-in{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:26px 0 8px}
  .scard{background:var(--paper);border:1px solid var(--paper-line);border-radius:var(--r);padding:19px 18px;color:var(--ink)}
  .scard .sic{width:22px;height:22px;color:var(--seal)}
  .scard b{display:block;margin-top:13px;font-family:var(--serif);font-size:1rem;font-weight:700;letter-spacing:-.01em}
  .scard span{display:block;color:var(--ink-soft);font-size:.83rem;margin-top:5px;line-height:1.55}
  @media(max-width:700px){.str-in{grid-template-columns:1fr}}

  /* ---------- 소개 ---------- */
  .intro{padding:38px 0 8px;border-top:1px solid var(--cover-line);margin-top:20px}
  .intro .eyebrow2{font-size:.72rem;letter-spacing:.2em;color:var(--seal-hi);text-transform:uppercase;font-weight:700;display:block;margin-bottom:10px}
  .intro h2{font-family:var(--serif);font-size:1.35rem;font-weight:700;letter-spacing:-.01em;margin-bottom:12px;color:var(--off)}
  .intro p{color:var(--off-soft);font-size:.94rem;margin-bottom:14px;max-width:64ch;line-height:1.75}
  .intro .areas{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .intro .areas span{border:1px solid var(--cover-line);border-radius:999px;padding:5px 13px;font-size:.76rem;color:var(--off-soft);font-weight:600}

  /* ---------- 찾아오시는 길 ---------- */
  .visit{padding:14px 0 36px}
  .visit-addr{background:var(--paper);border:1px solid var(--paper-line);border-radius:var(--r);padding:18px 19px;margin-bottom:14px;color:var(--ink)}
  .va-line{font-size:1.02rem;font-weight:700;font-family:var(--serif)}
  .va-sub{color:var(--ink-soft);font-size:.85rem;margin-top:5px}
  .map-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .mapbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 8px;border-radius:var(--r);
    font-weight:700;font-size:.87rem;cursor:pointer;border:1px solid transparent;
    min-height:48px;text-align:center}
  .mapbtn.nv{background:#03c75a;color:#fff}
  .mapbtn.kk{background:#ffe812;color:#3a1d1d}
  .mapbtn.tm{background:#1b3ce0;color:#fff}
  .mapbtn.cp{background:transparent;color:var(--off);border-color:var(--cover-line)}
  @media(max-width:560px){.map-btns{grid-template-columns:1fr 1fr}}

  /* ---------- 상태 탭 (밑줄식) ---------- */
  .statetabs{display:flex;gap:26px;margin:34px 0 0;border-bottom:1px solid var(--cover-line)}
  .statetabs button{border:none;background:transparent;padding:0 0 13px;font-weight:700;color:var(--off-soft);
    cursor:pointer;min-height:42px;font-size:.96rem;border-bottom:2px solid transparent;margin-bottom:-1px}
  .statetabs button.on{color:var(--off);border-color:var(--seal-hi)}
  .statetabs button .n{opacity:.8;font-weight:600;margin-left:4px;font-size:.85rem}

  /* ---------- 필터 (종이 슬립) ---------- */
  .filters-box{background:var(--paper);border:1px solid var(--paper-line);border-radius:var(--r);padding:16px;margin:18px 0;color:var(--ink)}
  .search{position:relative;margin-bottom:12px}
  .search input{width:100%;padding:12px 14px 12px 38px;border:1px solid var(--paper-line);
    border-radius:4px;background:#fff;color:var(--ink)}
  .search input::placeholder{color:var(--ink-soft)}
  .search input:focus{outline:2px solid var(--seal);outline-offset:0;border-color:var(--seal)}
  .search .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-soft);width:16px;height:16px}
  .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
  .fgrid select{width:100%;padding:11px 12px;border:1px solid var(--paper-line);border-radius:4px;
    background:#fff;font-weight:600;color:var(--ink);min-height:44px}
  .fgrid select:focus{outline:2px solid var(--seal);outline-offset:0;border-color:var(--seal)}
  .origin-chips{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
  .ochip{background:#fff;border:1px solid var(--paper-line);border-radius:999px;padding:8px 16px;
    font-size:.85rem;font-weight:700;color:var(--ink);cursor:pointer;min-height:38px}
  .ochip.on{background:var(--seal);color:var(--off);border-color:var(--seal)}
  .adv-toggle{margin-top:11px;background:none;border:none;color:var(--seal);font-weight:700;
    font-size:.85rem;cursor:pointer;padding:6px 2px;min-height:38px}
  .adv{display:none;margin-top:8px;padding-top:11px;border-top:1px dashed var(--paper-line)}
  .adv.open{display:block}
  .adv .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .adv .row label{font-weight:700;font-size:.82rem;min-width:64px;color:var(--ink-soft)}
  .adv .row input{flex:1;min-width:90px;padding:9px 11px;border:1px solid var(--paper-line);border-radius:4px;background:#fff;color:var(--ink)}
  .filter-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap}
  .reset-btn{background:transparent;border:1px solid var(--paper-line);border-radius:4px;padding:8px 14px;font-weight:700;font-size:.82rem;cursor:pointer;color:var(--ink-soft);min-height:38px}
  .count{color:var(--off-soft);font-size:.85rem;font-weight:600}

  /* ---------- 매물 그리드 (paper 카드) ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:18px;padding-bottom:36px}
  .card{background:var(--paper);border:1px solid var(--paper-line);border-radius:var(--r);
    overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;
    text-align:left;width:100%;font:inherit;color:var(--ink);padding:0;display:block}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-sm)}
  .card:active{transform:translateY(-1px)}
  .ph{position:relative;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:.8rem;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.3);text-align:center;padding:8px;
    background-size:cover;background-position:center;background-color:var(--paper-dim)}
  .ph::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 62%,rgba(0,0,0,.32) 100%)}
  .ph span{position:relative;z-index:1}
  .badge-sold{position:absolute;top:10px;left:10px;z-index:2;background:var(--ink);color:var(--off);
    font-size:.72rem;font-weight:800;padding:5px 10px;border-radius:3px;letter-spacing:.02em}
  .badge-cat{position:absolute;top:10px;right:10px;z-index:2;background:rgba(16,23,31,.78);color:#fff;
    font-size:.68rem;font-weight:700;padding:4px 9px;border-radius:3px}
  .stamp{position:absolute;right:8px;bottom:8px;z-index:2;width:50px;height:50px;color:var(--seal-hi);
    opacity:.96;transform:rotate(-9deg);filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .stamp circle,.stamp path{vector-effect:non-scaling-stroke}
  .d-stamp{width:80px;height:80px;color:var(--seal);opacity:1;transform:rotate(-7deg);
    filter:drop-shadow(0 3px 6px rgba(156,43,43,.25));flex-shrink:0}
  .card-body{padding:14px 15px 16px}
  .car-name{font-family:var(--serif);font-weight:700;font-size:1.02rem;letter-spacing:-.01em;overflow-wrap:anywhere;word-break:break-word;color:var(--ink)}
  .car-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .car-tags .t{border:1px solid var(--paper-line);color:var(--ink-soft);font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:3px}
  .car-meta{color:var(--ink-soft);font-size:.82rem;margin-top:8px;overflow-wrap:anywhere}
  .car-price{margin-top:9px;color:var(--ink);font-weight:800;font-size:1.18rem}
  .car-price small{font-size:.76rem;color:var(--ink-soft);font-weight:600}
  .card.done{opacity:.6}

  /* ---------- 상세: 서류 시트 ---------- */
  .detail{padding:26px 0 44px}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--off-soft);font-weight:600;
    font-size:.88rem;margin-bottom:16px;cursor:pointer;background:none;border:none;min-height:44px;padding:6px 4px}
  .back:hover{color:var(--off)}
  .sheet{background:var(--paper);border:1px solid var(--paper-line);border-radius:var(--r-lg);
    padding:22px 22px 26px;color:var(--ink);box-shadow:var(--shadow)}
  .gallery{position:relative;border-radius:4px;overflow:hidden;border:1px solid var(--paper-line);background:var(--paper-dim);margin-bottom:22px}
  .slides{display:flex;transition:transform .3s ease;touch-action:pan-y}
  .slide{min-width:100%;aspect-ratio:16/10}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;
    background:rgba(16,23,31,.55);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;
    justify-content:center;cursor:pointer;font-size:1.25rem;color:#fff;backdrop-filter:blur(4px);z-index:3}
  .gnav:hover{background:rgba(16,23,31,.75)}
  .gnav.prev{left:10px}.gnav.next{right:10px}
  .dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:3}
  .dots button{width:22px;height:22px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .dots button::before{content:"";width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.55);transition:.2s}
  .dots button.on::before{background:var(--seal-hi);width:18px;border-radius:4px}
  .d-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:8px}
  .d-title{font-family:var(--serif);font-size:1.55rem;font-weight:700;letter-spacing:-.01em;overflow-wrap:anywhere;word-break:break-word}
  .d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .d-tags .t{border:1px solid var(--paper-line);color:var(--ink-soft);font-size:.76rem;font-weight:700;padding:4px 10px;border-radius:3px}
  .d-price{color:var(--ink);font-weight:800;font-size:1.7rem;margin-bottom:20px;padding-bottom:20px;border-bottom:1px dashed var(--paper-line)}
  .d-price small{font-size:.85rem;font-weight:600;color:var(--ink-soft)}
  .spec{display:grid;grid-template-columns:repeat(2,1fr);gap:0;margin-bottom:20px;border:1px solid var(--paper-line);border-radius:4px;overflow:hidden}
  .spec .item{padding:12px 15px;border-bottom:1px solid var(--paper-line);border-right:1px solid var(--paper-line)}
  .spec .item:nth-child(2n){border-right:none}
  .spec .item:nth-last-child(-n+2){border-bottom:none}
  .spec .item small{display:block;color:var(--ink-soft);font-size:.74rem;margin-bottom:4px;font-weight:600}
  .spec .item b{font-size:1rem;font-weight:700}
  .desc{background:#fff;border:1px solid var(--paper-line);border-radius:4px;padding:16px;
    color:var(--ink);white-space:pre-line;margin-bottom:20px;overflow-wrap:anywhere;font-size:.94rem;line-height:1.75}

  /* ---------- 버튼 ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--seal);
    color:var(--off);border:1px solid var(--seal-hi);border-radius:var(--r);padding:14px 22px;font-weight:700;cursor:pointer;
    width:100%;font-size:.98rem;transition:background .15s;min-height:48px}
  .btn:hover{background:var(--seal-hi)}
  .btn.sec{background:transparent;color:var(--off);border:1px solid var(--cover-line)}
  .btn.sec:hover{border-color:var(--off-soft)}
  .btn.onpaper{color:var(--ink);border-color:var(--paper-line)}

function normalizeList(arr){
  return (arr||[]).map(c=>{
    const name=String(c.name||'이름없음');

    return {
      id:c.id||name, name,
      origin:origin||'국산', brand:brand||'기타', body:bd||'기타',

let state={tab:'onsale',q:'',origin:'',brand:'',body:'',fuel:'',yearMin:'',yearMax:'',kmMax:'',sort:'new',adv:false};
function brandOptions(){
  if(state.origin==='국산') return BRANDS['국산'];

  return [...BRANDS['국산'],...BRANDS['수입'].filter(b=>b!=='기타')];
}
function filterSort(forSold){
  const q=state.q.trim().toLowerCase();
  let items=getList().filter(c=>{
    if(forSold ? !c.sold : c.sold) return false;
    if(state.origin && c.origin!==state.origin) return false;
    if(state.brand && c.brand!==state.brand) return false;
    if(state.body && c.body!==state.body) return false;
    if(state.fuel && !(c.fuel||'').includes(state.fuel)) return false;
    if(state.yearMin && (c.year||0)<+state.yearMin) return false;
    if(state.yearMax && (c.year||0)>+state.yearMax) return false;
    if(state.kmMax && (c.km||0)>+state.kmMax*10000) return false;
    if(!q) return true;
    const s=(c.name+' '+c.brand+' '+c.body+' '+c.color+' '+c.fuel+' '+c.year+' '+c.price+' '+c.km+' '+(c.trans||'')+' '+(c.desc||'')+' '+(c.options||'')).toLowerCase();
    return s.includes(q);
  });
  items.sort((a,b)=>{
    switch(state.sort){
      case 'price_a':return (a.price||0)-(b.price||0);
      case 'price_d':return (b.price||0)-(a.price||0);
      case 'year_d':return (b.year||0)-(a.year||0);
      case 'km_a':return (a.km||0)-(b.km||0);
      default:return (b.createdAt||0)-(a.createdAt||0);
    }
  });
  return items;
}

          </div>
          <div class="hero-cred">
            <span>정비기능사 직접 점검</span><span>·</span><span>성능점검기록부 제공</span><span>·</span><span>청주오토월드 실차 확인</span>
          </div>
        </div>
        <div class="hero-seal">${heroSealSVG()}</div>
      </div>
    </div>
  </section>
  <section class="strengths">
    <div class="wrap str-in">
      <div class="scard"><svg class="sic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M14.7 6.3a4 4 0 0 0-5.6 5L3 17.4 5.6 20l6.1-6.1a4 4 0 0 0 5-5.6l-2.5 2.5-2-2 2.5-2.5z"/></svg><b>정비기능사 직접 점검</b><span>등록 전 차량 상태를 직접 확인한 매물만 올립니다</span></div>
      <div class="scard"><svg class="sic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M6 3h9l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M15 3v4h4M9 13l2 2 4-4"/></svg><b>성능점검기록부 제공</b><span>매물마다 점검 결과를 문서로 함께 안내합니다</span></div>
      <div class="scard"><svg class="sic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M12 21s7-6.1 7-11.5A7 7 0 0 0 5 9.5C5 14.9 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.4"/></svg><b>청주오토월드 실차 확인</b><span>청주시 청원구 매매단지에서 직접 보실 수 있습니다</span></div>
    </div>
  </section>
  <div class="wrap intro">
    <span class="eyebrow2">안내</span>
    <h2>청주중고차 매매, 이렇게 고르세요</h2>
    <p>중고차는 사진과 광고 문구만으로는 상태를 알기 어렵습니다. 이 페이지는 청주오토월드 매매단지에서 실제로 관리 중인 매물 정보를 정리해 보여드리며, 연식·주행거리·연료·가격을 기준으로 바로 비교할 수 있습니다. 궁금한 매물은 전화로 문의하시면 실차 확인 일정을 안내해 드립니다.</p>
    <div class="areas">
      <span>청주시 청원구</span><span>흥덕구</span><span>상당구</span><span>서원구</span><span>오창</span><span>오송</span><span>청주오토월드</span>
    </div>
  </div>
  <div class="wrap">
    <div class="statetabs" role="tablist">
      <button role="tab" class="${state.tab==='onsale'?'on':''}" onclick="setTab('onsale')">판매중<span class="n">${nOn}</span></button>
      <button role="tab" class="${state.tab==='sold'?'on':''}" onclick="setTab('sold')">판매완료<span class="n">${nSold}</span></button>
    </div>
    <div class="filters-box">
      <div class="search">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" aria-label="매물 검색" placeholder="차종·모델·색상·옵션 검색" value="${esc(state.q)}">
      </div>
      <div class="origin-chips" id="originChips">
        ${['','국산','수입'].map(o=>`<button type="button" class="ochip${state.origin===o?' on':''}" data-origin="${esc(o)}">${o?esc(o)+'차':'전체'}</button>`).join('')}
      </div>
      <div class="fgrid">
        <select id="brandSel" aria-label="제조사">
          <option value="">전체 제조사</option>
          ${bopts.map(b=>`<option value="${esc(b)}"${state.brand===b?' selected':''}>${esc(b)}</option>`).join('')}
        </select>
        <select id="bodySel" aria-label="차종">
          <option value="">전체 차종</option>
          ${BODY_TYPES.map(b=>`<option value="${esc(b)}"${state.body===b?' selected':''}>${esc(b)}</option>`).join('')}
        </select>
        <select id="fuelSel" aria-label="연료">
          <option value="">전체 연료</option>
          ${['가솔린','디젤','LPG','하이브리드','전기'].map(f=>`<option value="${esc(f)}"${state.fuel===f?' selected':''}>${esc(f)}</option>`).join('')}
        </select>
        <select id="sortSel" aria-label="정렬">
          <option value="new"${state.sort==='new'?' selected':''}>최신 등록순</option>
          <option value="price_a"${state.sort==='price_a'?' selected':''}>가격 낮은순</option>
          <option value="price_d"${state.sort==='price_d'?' selected':''}>가격 높은순</option>
          <option value="year_d"${state.sort==='year_d'?' selected':''}>연식 최신순</option>
          <option value="km_a"${state.sort==='km_a'?' selected':''}>주행거리 적은순</option>
        </select>
      </div>
      <button type="button" class="adv-toggle" id="advToggle">${state.adv?'▲ 상세필터 접기':'▼ 상세필터 (연식·주행거리)'}</button>
      <div class="adv${state.adv?' open':''}" id="advBox">
        <div class="row"><label>연식</label>
          <input id="yMin" type="number" inputmode="numeric" placeholder="예: 2018" value="${esc(state.yearMin)}"> ~
          <input id="yMax" type="number" inputmode="numeric" placeholder="예: 2024" value="${esc(state.yearMax)}"></div>
        <div class="row"><label>주행거리</label>
          <input id="kMax" type="number" inputmode="numeric" placeholder="이하 (만km) 예: 8" value="${esc(state.kmMax)}"> 만km 이하</div>
      </div>
      <div class="filter-actions">
        <span class="count" id="count"></span>
        <button type="button" class="reset-btn" id="resetBtn">필터 초기화</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <section class="visit"><div class="wrap">
    <span class="eyebrow2">방문</span>
    <h2 style="font-family:var(--serif);font-size:1.2rem;font-weight:700;letter-spacing:-.01em;color:var(--off);margin-bottom:12px">찾아오시는 길</h2>
    <div class="visit-addr">
      <div class="va-line">📍 청주시 청원구 2순환로 50</div>
      <div class="va-sub">청주오토월드 중고차 매매단지 내</div>
      <div class="va-sub">상리사거리에서 성모병원 방향 · 24시간 상담 (연중무휴)</div>
    </div>
    <div class="map-btns">
      <a class="mapbtn nv" href="https://map.naver.com/p/search/2%EC%88%9C%ED%99%98%EB%A1%9C%2050/address/3zDVce,2AafmC,%EC%B6%A9%EC%B2%AD%EB%B6%81%EB%8F%84%20%EC%B2%AD%EC%A3%BC%EC%8B%9C%20%EC%B2%AD%EC%9B%90%EA%B5%AC%202%EC%88%9C%ED%99%98%EB%A1%9C%2050?c=15.00,0,0,0,dh" target="_blank" rel="noopener">네이버 지도</a>
      <a class="mapbtn kk" href="https://map.kakao.com/?q=충청북도%20청주시%20청원구%202순환로%2050" target="_blank" rel="noopener">카카오맵</a>
      <a class="mapbtn tm" href="tmap://search?name=충청북도%20청주시%20청원구%202순환로%2050">티맵</a>
      <button class="mapbtn cp" type="button" onclick="copyAddr()">주소 복사</button>
    </div>
  </div></section>`;

  document.getElementById('heroCall').setAttribute('href',telHref(SHOP.tel));
  const qEl=document.getElementById('q');
  qEl.addEventListener('input',e=>{state.q=e.target.value;renderGrid();});
  document.getElementById('originChips').addEventListener('click',e=>{
    const b=e.target.closest('.ochip'); if(!b)return;
    state.origin=b.dataset.origin; state.brand='';
    renderHome();
  });
  document.getElementById('brandSel').addEventListener('change',e=>{state.brand=e.target.value;renderGrid();});
  document.getElementById('bodySel').addEventListener('change',e=>{state.body=e.target.value;renderGrid();});
  document.getElementById('fuelSel').addEventListener('change',e=>{state.fuel=e.target.value;renderGrid();});
  document.getElementById('sortSel').addEventListener('change',e=>{state.sort=e.target.value;renderGrid();});
  document.getElementById('advToggle').addEventListener('click',()=>{state.adv=!state.adv;
    document.getElementById('advBox').classList.toggle('open',state.adv);
    document.getElementById('advToggle').textContent=state.adv?'▲ 상세필터 접기':'▼ 상세필터 (연식·주행거리)';});
  const bindNum=(id,key)=>{const el=document.getElementById(id);if(el)el.addEventListener('input',e=>{state[key]=e.target.value;renderGrid();});};
  bindNum('yMin','yearMin');bindNum('yMax','yearMax');bindNum('kMax','kmMax');
  document.getElementById('resetBtn').addEventListener('click',()=>{
    state={tab:state.tab,q:'',origin:'',brand:'',body:'',fuel:'',yearMin:'',yearMax:'',kmMax:'',sort:'new',adv:false};renderHome();});
  renderGrid();
}
function setTab(t){state.tab=t;renderHome();}
function renderGrid(){
  const items=filterSort(state.tab==='sold');
  const grid=document.getElementById('grid');
  const count=document.getElementById('count');
  if(!grid)return;
  count.textContent=`총 ${items.length}대`;
  grid.innerHTML = items.length ? items.map((c,i)=>`
    <button class="card${c.sold?' done':''}" type="button" onclick="location.hash='#detail/${encodeURIComponent(c.id)}'" aria-label="${esc(c.name)} 상세보기">
      <div class="ph${c.photos&&c.photos.length?' has-photo':''}" style="${phStyle(c,i)}">
        ${c.sold?'<span class="badge-sold">판매완료</span>':stampSVG(c.id,'stamp')}
        ${c.body&&c.body!=='기타'?`<span class="badge-cat">${esc(c.body)}</span>`:''}
        ${c.photos&&c.photos.length?'':'<span>사진 준비중</span>'}
      </div>
      <div class="card-body">
        <div class="car-name">${esc(c.name)}</div>
        <div class="car-tags">
          ${c.brand&&c.brand!=='기타'?`<span class="t">${esc(c.brand)}</span>`:''}
          ${c.origin?`<span class="t">${esc(c.origin)}</span>`:''}
        </div>
        <div class="car-meta">${esc(c.year)}년식 · ${kmf(c.km)}km${c.fuel?' · '+esc(c.fuel):''}${c.color?' · '+esc(c.color):''}</div>
        <div class="car-price">${priceLabel(c.price)}</div>
      </div>
    </button>`).join('')
    : `<div class="empty" style="grid-column:1/-1">${state.tab==='sold'?'판매완료된 매물이 없습니다.':'조건에 맞는 매물이 없습니다.'}</div>`;
}

/* ---------- 상세 ---------- */
let gIndex=0,gCount=0;
function renderDetail(id){
  const c=getList().find(x=>x.id===id);
  if(!c){toast('해당 매물을 찾을 수 없습니다.');goHome();return;}
  gIndex=0;
  const photos=(c.photos&&c.photos.length)?c.photos:[null,null,null];
  gCount=photos.length;
  let slides='';
  photos.forEach((p,i)=>{const st=p?`background-image:url('${photoUrl(p).replace(/'/g,"%27")}')`:phGrad(c.hue,i);
    slides+=`<div class="slide ph${p?' has-photo':''}" style="${st}">${p?'':`<span>사진 준비중 ${i+1}</span>`}</div>`;});
  let dots='';for(let i=0;i<gCount;i++)dots+=`<button type="button" class="${i===0?'on':''}" data-d="${i}" aria-label="${i+1}번째 사진"></button>`;
  document.title=`${c.name} — 청주중고차`;
  document.getElementById('view').innerHTML=`
  <div class="wrap detail">
    <button class="back" type="button" onclick="goBackOrHome()">← 목록으로</button>
    <div class="sheet">
      <div class="gallery" id="gallery" tabindex="0" role="region" aria-label="차량 사진 갤러리">
        <div class="slides" id="slides">${slides}</div>
        ${gCount>1?`<button type="button" class="gnav prev" aria-label="이전 사진" onclick="slide(-1)">‹</button>
        <button type="button" class="gnav next" aria-label="다음 사진" onclick="slide(1)">›</button>
        <div class="dots" id="dots">${dots}</div>`:''}
      </div>
      <div class="d-head">
        <div class="d-title">${esc(c.name)} ${c.sold?'<span class="badge-sold" style="position:static;display:inline-block">판매완료</span>':''}</div>
        ${c.sold?'':stampSVG(c.id+'_d','d-stamp')}
      </div>
      <div class="d-tags">
        ${c.origin?`<span class="t">${esc(c.origin)}차</span>`:''}
        ${c.brand&&c.brand!=='기타'?`<span class="t">${esc(c.brand)}</span>`:''}
        ${c.body&&c.body!=='기타'?`<span class="t">${esc(c.body)}</span>`:''}
      </div>
      <div class="d-price">${priceLabelPlain(c.price)}</div>
      <div class="spec">
        <div class="item"><small>연식</small><b>${esc(c.year)}년식</b></div>
        <div class="item"><small>주행거리</small><b>${kmf(c.km)} km</b></div>
        <div class="item"><small>연료</small><b>${esc(c.fuel||'문의')}</b></div>
        <div class="item"><small>변속기</small><b>${esc(c.trans||'-')}</b></div>
        ${c.color?`<div class="item"><small>색상</small><b>${esc(c.color)}</b></div>`:''}
        <div class="item"><small>차종</small><b>${esc(c.body||'-')}</b></div>
      </div>
      ${c.options?`<div class="desc" style="margin-bottom:10px"><b>옵션</b><br>${esc(c.options)}</div>`:''}
      <div class="desc">${esc(c.desc||'설명이 없습니다.')}</div>
      <div class="btn-row">
        <a class="btn" style="flex:1;text-decoration:none" href="${telHref(SHOP.tel)}"><span aria-hidden="true">☎</span> ${c.sold?'비슷한 매물 전화 문의':'전화로 문의하기'}</a>
        <button class="btn onpaper" style="flex:1;background:transparent" onclick="shareCar('${encodeURIComponent(c.id)}')">링크 복사·공유</button>
      </div>
    </div>
  </div>`;
  setupGallery();
}
function slide(dir){if(gCount<=1)return;gIndex=(gIndex+dir+gCount)%gCount;const el=document.getElementById('slides');if(el)el.style.transform=`translateX(-${gIndex*100}%)`;document.querySelectorAll('#dots button').forEach(b=>b.classList.toggle('on',+b.dataset.d===gIndex));}
function goSlide(i){gIndex=i;const el=document.getElementById('slides');if(el)el.style.transform=`translateX(-${gIndex*100}%)`;document.querySelectorAll('#dots button').forEach(b=>b.classList.toggle('on',+b.dataset.d===gIndex));}
function setupGallery(){
  const el=document.getElementById('slides');if(!el)return;let x0=null;
  el.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>40)slide(dx<0?1:-1);x0=null;});
  document.querySelectorAll('#dots button').forEach(b=>b.addEventListener('click',()=>goSlide(+b.dataset.d)));
  const g=document.getElementById('gallery');
  if(g)g.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){slide(-1);e.preventDefault();}else if(e.key==='ArrowRight'){slide(1);e.preventDefault();}});
}
async function shareCar(encId){
  const url=location.origin+location.pathname+'#detail/'+encId;
  try{
    if(navigator.share){await navigator.share({title:SHOP.name,url});return;}
    if(navigator.clipboard){await navigator.clipboard.writeText(url);toast('링크를 복사했습니다.');return;}
  }catch(e){}
  toast('복사를 지원하지 않는 환경입니다.');
}

/* ---------- 시작 ---------- */
applyShop();
window.addEventListener('hashchange',router);
router();
loadRemote().then(()=>{ router(); });
</script>
</body>
</html>
